                    <button onClick=${() => setFormOpen(false)} className="absolute top-8 right-8 text-slate-300 hover:text-slate-800 transition-colors text-right"><${X} size=${40} /></button>
                    <${InteractiveFlow} setModalOpen=${setFormOpen} />
                </div>
            </div>
        `}
    </div> `;
};

const rootEl = document.getElementById("root");
createRoot(rootEl).render(html`<${App} />`);

   setTimeout(() => {
    new Swiper(".mySwiper", {
        loop: true,
        autoplay: {
            delay: 3000,
            disableOnInteraction: false,
        },
        pagination: {
            el: ".swiper-pagination",
            clickable: true,
        },
    });
}, 500);     
</script>
</body>
