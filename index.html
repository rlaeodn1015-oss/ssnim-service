<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>스승님 - 결과로 증명하는 맞춤 골프레슨 AI 매칭</title>

    <!-- 1. 분석 및 마케팅 툴 (GTM 등) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3YC9WJBPMZ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-3YC9WJBPMZ');
    </script>

    <!-- 2. 메타 태그 (공유용) -->
    <meta name="description" content="버려지는 레슨비 0원, 내 골프 고민에 딱 맞는 검증된 스승님을 AI가 정밀 매칭합니다.">
    <meta property="og:title" content="스승님 - 요청 맞춤 골프레슨 매칭">
    <meta property="og:image" content="https://rlaeodn1015-oss.github.io/ssnim-request-landing/images/ssnim.png">

    <!-- 3. 외부 라이브러리 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100;400;700;900&display=swap" rel="stylesheet" />

    <!-- 4. Tailwind 설정 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "brand-blue": "#0066FF", "brand-emerald": "#10b981", "slate-850": "#1e293b" },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem' }
                },
            },
        };
    </script>

    <!-- 5. 중요: 모듈 불러오기 설정 (Import Map) -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@19.2.0",
                "react-dom/client": "https://esm.sh/react-dom@19.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.562.0",
                "htm": "https://esm.sh/htm@3.1.1"
            }
        }
    </script>

    <!-- 6. 인라인 스타일 (필요 시 유지, 혹은 js/css 폴더로 분리 가능) -->
    <style>
        body { font-family: "Pretendard", sans-serif; background: #fff; color: #111827; -webkit-font-smoothing: antialiased; }
        .clay-card { background: #ffffff; border-radius: 2rem; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05); }
        .gradient-blue { background: linear-gradient(135deg, #0066FF 0%, #004dc2 100%); }
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        /* ... 기타 필요한 애니메이션 CSS만 남기세요 ... */
    </style>
</head>

<body class="overflow-x-hidden bg-white">
    <!-- React 앱이 실행될 유일한 입구 -->
    <div id="root"></div>

    <!-- 7. 외부 라이브러리 JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- 8. 핵심: 모든 사령부 로직이 담긴 app.js 호출 -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
