<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>스승님 - 레슨비 결제</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://js.bootpay.co.kr/bootpay-5.3.0.min.js" type="application/javascript"></script>

    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            letter-spacing: -0.03em;
        }

        .active-card {
            border-color: #0066FF !important;
            background-color: #F0F7FF !important;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-5">

    <div id="payment-box" class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-slate-900 mb-2">레슨비 결제하기</h1>
            <p id="customer-info" class="text-slate-500 font-bold text-sm">정보를 불러오는 중...</p>
        </div>

        <div id="split-selector" class="space-y-4 mb-10">
            <p class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 text-center">결제 방식 선택</p>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="setPayMode('total')" id="btn-total" class="flex flex-col items-center justify-center py-5 rounded-2xl border-2 active-card transition-all group">
                    <span class="text-xs font-bold text-slate-400 group-[.active-card]:text-blue-500 mb-1">한 번에</span>
                    <span class="text-sm font-black text-slate-900">전액 결제</span>
                </button>

                <button onclick="setPayMode('split')" id="btn-split" class="flex flex-col items-center justify-center py-5 rounded-2xl border-2 border-slate-100 bg-white transition-all group">
                    <span class="text-xs font-bold text-slate-400 group-[.active-card]:text-blue-500 mb-1">동반자와</span>
                    <span class="text-sm font-black text-slate-900">1/N 나눠내기</span>
                </button>
            </div>

            <p id="split-desc" class="text-[11px] text-center text-blue-600 font-bold opacity-0 transition-opacity">
                ※ 동반자들에게 이 페이지 링크를 공유하여 각자 결제하세요.
            </p>
        </div>

        <div class="bg-slate-50 rounded-3xl p-8 mb-8 text-center border border-slate-100 shadow-inner">
            <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">최종 결제 금액</p>
            <p id="display-price" class="text-4xl font-black text-slate-950 tracking-tighter">0원</p>
        </div>

        <div class="mb-4 p-6 bg-blue-50 rounded-[2rem] border border-blue-100 text-center">
            <p class="text-[13px] font-black text-blue-700 mb-4 leading-relaxed">
                지인과 나눠서 결제하시나요?<br>
                아래 버튼을 눌러 결제 링크를 보내주세요.
            </p>

            <button onclick="sharePaymentLink()" class="w-full bg-white text-blue-600 font-black py-4 rounded-2xl border-2 border-blue-200 shadow-sm flex items-center justify-center gap-2 active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                    <polyline points="16 6 12 2 8 6"></polyline>
                    <line x1="12" y1="2" x2="12" y2="15"></line>
                </svg>
                결제 링크 지인에게 공유하기
            </button>
        </div>

        <div class="mb-4 space-y-2">
            <p class="text-[12px] font-black text-slate-400 uppercase tracking-widest ml-1">성함 (실명)</p>
            <input
                type="text"
                id="user-name-input"
                placeholder="실명을 입력해주세요"
                class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-600 font-bold text-slate-700 transition-all"
            >
        </div>

        <div class="mb-6 space-y-2">
            <p class="text-[12px] font-black text-slate-400 uppercase tracking-widest ml-1">알림톡 받으실 번호</p>
            <input
                type="tel"
                id="user-phone"
                placeholder="번호만 입력 (- 제외)"
                class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-600 font-bold text-slate-700 transition-all"
            >
            <p class="text-[10px] text-slate-400 font-medium ml-1">
                ※ 결제 완료 시 이 번호로 레슨 확정 알림톡이 발송됩니다.
            </p>
        </div>

        <button onclick="requestBootpay()" id="pay-btn" class="w-full bg-blue-600 text-white font-black py-5 rounded-[1.5rem] shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition-all text-lg">
            지금 결제하기
        </button>

        <p class="text-center mt-6 text-[11px] text-slate-400 font-medium leading-relaxed">
            안전한 결제를 위해 스승님 보안 시스템이 작동 중입니다.<br>
            결제 완료 시 예약이 즉시 확정됩니다.
        </p>
    </div>

    <script>
        let rawPrice = 0;
        let finalPayPrice = 0;
        let personCount = 1;
        let requestId = "";
        let customerName = "";
        let globalProPhone = "";

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQ8J_RALahps4C_Ahi4_MHwKiDKxnOzu_ZMOKwbAWcq7N0jdPVcdRgD5OzdG5o9xeV/exec";
        const ZAPIER_MAIN_URL = "https://hooks.zapier.com/hooks/catch/27197789/ujdmj18/";
        const ZAPIER_EXTERNAL_SOLAPI_URL = "https://hooks.zapier.com/hooks/catch/27197789/4y901so/";

        function getParamAny(params, keys, fallback = "") {
            for (const key of keys) {
                const value = params.get(key);
                if (value !== null && value !== undefined && String(value).trim() !== "") {
                    return value;
                }
            }
            return fallback;
        }

        function parsePrice(value) {
            const onlyNumber = String(value || "").replace(/[^0-9]/g, "");
            return parseInt(onlyNumber, 10) || 0;
        }

        function formatWon(amount) {
            return Number(amount || 0).toLocaleString("ko-KR") + "원";
        }

        function updatePriceDisplay() {
            const display = document.getElementById("display-price");
            if (display) {
                display.innerText = formatWon(finalPayPrice);
            }
        }

        document.addEventListener("DOMContentLoaded", async () => {
            const params = new URLSearchParams(window.location.search);

            const isBootpayRedirect = params.get("receipt_id") || params.get("status") === "done";

            if (isBootpayRedirect) {
                await handleBootpayRedirect(params);
                return;
            }

            const priceParam = getParamAny(params, ["price", "Price", "PRICE", "amount", "finalPrice", "paymentPrice"], "0");

            rawPrice = parsePrice(priceParam);
            finalPayPrice = rawPrice;

            customerName = getParamAny(params, ["name", "userName"], "고객님");
            requestId = getParamAny(params, ["requestId", "REQ_ID", "reqId"], "req_" + Date.now());
            globalProPhone = getParamAny(params, ["proPhone", "proContact"], "");

            const lessonType = getParamAny(params, ["type", "lessonType"], "레슨");
            const isOneOnOne =
                lessonType.includes("1:1") ||
                lessonType === "레슨" ||
                lessonType === "1" ||
                lessonType.trim() === "";

            const personParam = getParamAny(params, ["personCount", "person"], "1인");
            const parsedPerson = parseInt(String(personParam).replace(/[^0-9]/g, ""), 10);

            personCount = parsedPerson > 1 ? parsedPerson : 1;

            if (isOneOnOne) {
                personCount = 1;
            }

            const customerInfo = document.getElementById("customer-info");
if (customerInfo) {
    // 기존: ${name}님 대신 ${customerName}님으로 변경
    customerInfo.innerText = `${customerName}님, 맞춤 레슨 견적입니다.`;
}

            updatePriceDisplay();

            const selector = document.getElementById("split-selector");
            if (selector) {
                selector.style.display = personCount > 1 ? "block" : "none";
            }

            if (rawPrice <= 0) {
                const payBtn = document.getElementById("pay-btn");
                if (payBtn) {
                    payBtn.disabled = true;
                    payBtn.innerText = "결제 금액 오류";
                    payBtn.classList.add("bg-slate-400");
                    payBtn.classList.remove("bg-blue-600", "hover:bg-blue-700");
                }

                alert("결제 금액이 정상적으로 전달되지 않았습니다. 운영팀에 문의해주세요.");
            }
        });

        async function handleBootpayRedirect(params) {
            if (params.get("bootpay_event") === "cancel" || params.get("cancel") === "true") {
                alert("결제가 취소되었습니다. 다시 진행해주세요.");
                location.replace(window.location.pathname + "?" + removeParam(window.location.search, ["receipt_id", "status", "bootpay_event", "cancel"]));
                return;
            }

            const paymentBox = document.getElementById("payment-box");
            if (paymentBox) {
                paymentBox.innerHTML = `
                    <div class="py-20 text-center">
                        <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
                        <p class="font-bold text-blue-600">예약 정보를 안전하게 기록 중입니다...<br>잠시만 기다려주세요.</p>
                    </div>
                `;
            }

            const reqId = getParamAny(params, ["requestId", "REQ_ID", "reqId"], "");
            const paidAmtParam = getParamAny(params, ["price", "Price", "PRICE", "amount", "finalPrice", "paymentPrice"], "0");
            const paidAmt = parsePrice(paidAmtParam);

            const userName = getParamAny(params, ["name", "userName"], "고객");
            const userPhone = getParamAny(params, ["phone", "contact", "userPhone"], "");
            const lessonType = getParamAny(params, ["type", "lessonType"], "");

            const zapierData = {
    action: "updatePayment",
    status: "paid",

    requestId: reqId,

    price: paidAmt,
    finalPrice: paidAmt,
    paymentPrice: paidAmt,

    name: userName,
    userName: userName,

    phone: userPhone,
    contact: userPhone,
    userPhone: userPhone,

    type: lessonType,
    lessonType: lessonType,

    personCount: getParamAny(params, ["personCount", "person"], "1인"),

    selectedPro: getParamAny(params, ["selectedPro", "selectedpro", "proName"], ""),
    selectedpro: getParamAny(params, ["selectedPro", "selectedpro", "proName"], ""),
    proName: getParamAny(params, ["selectedPro", "selectedpro", "proName"], ""),

    proPhone: getParamAny(params, ["proPhone", "proContact"], ""),
    proContact: getParamAny(params, ["proPhone", "proContact"], ""),

    schedule: getParamAny(params, ["schedule", "SCHEDULE"], ""),
    SCHEDULE: getParamAny(params, ["schedule", "SCHEDULE"], ""),

    location: getParamAny(params, ["LOCATION", "location"], ""),
    LOCATION: getParamAny(params, ["LOCATION", "location"], ""),

    club: getParamAny(params, ["club"], ""),
    concern: getParamAny(params, ["concern", "include"], "")
};

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        action: "updatePayment",
                        status: "paid",
                        requestId: reqId,
                        price: paidAmt,
                        name: userName
                    })
                });

                await fetch(ZAPIER_MAIN_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(zapierData)
                });

                const externalKeywords = ["조인", "파3", "숏게임", "9홀", "18홀", "캠프", "라운드", "필드"];
                const isExternal = externalKeywords.some(key => lessonType.includes(key));
                const isNotOneOnOne = !lessonType.includes("1:1") && lessonType !== "레슨";

                if (userPhone && isExternal && isNotOneOnOne) {
                    navigator.sendBeacon(ZAPIER_EXTERNAL_SOLAPI_URL, JSON.stringify(zapierData));
                }

                location.replace("success.html?v=" + Date.now());
            } catch (e) {
                console.error("결제 완료 처리 오류:", e);
                location.replace("success.html?v=" + Date.now());
            }
        }

        function setPayMode(mode) {
            const btnTotal = document.getElementById("btn-total");
            const btnSplit = document.getElementById("btn-split");
            const splitDesc = document.getElementById("split-desc");

            if (mode === "split") {
                finalPayPrice = Math.floor(rawPrice / personCount);

                if (btnSplit) btnSplit.classList.add("active-card");
                if (btnTotal) btnTotal.classList.remove("active-card");
                if (splitDesc) splitDesc.style.opacity = "1";
            } else {
                finalPayPrice = rawPrice;

                if (btnTotal) btnTotal.classList.add("active-card");
                if (btnSplit) btnSplit.classList.remove("active-card");
                if (splitDesc) splitDesc.style.opacity = "0";
            }

            updatePriceDisplay();
        }

        async function requestBootpay() {
            const params = new URLSearchParams(window.location.search);

            const nameInput = document.getElementById("user-name-input").value.trim();
            const phoneInput = document.getElementById("user-phone").value.replace(/[^0-9]/g, "");

            if (!nameInput) {
                alert("성함을 입력해주세요.");
                return;
            }

            if (phoneInput.length < 10) {
                alert("알림톡을 받을 정확한 핸드폰 번호를 입력해주세요.");
                return;
            }

            if (finalPayPrice < 100) {
                alert("결제 금액이 너무 낮습니다.");
                return;
            }

            const lessonType = getParamAny(params, ["type", "lessonType"], "조인레슨");
            const selectedPro = getParamAny(params, ["selectedPro", "selectedpro", "proName"], "");
            const schedule = getParamAny(params, ["schedule", "SCHEDULE"], "");
            const locationText = getParamAny(params, ["LOCATION", "location"], "");
            const club = getParamAny(params, ["club"], "미지정");
            const concern = getParamAny(params, ["concern", "include"], "레슨 신청");

            const initialPayload = {
    action: "createRequest",
    status: "결제 대기",

    requestId: requestId,

    name: nameInput,
    userName: nameInput,

    phone: phoneInput,
    contact: phoneInput,
    userPhone: phoneInput,

    type: lessonType,
    lessonType: lessonType,

    location: locationText,
    LOCATION: locationText,

    club: club,
    concern: concern,

    schedule: schedule,
    SCHEDULE: schedule,

    selectedPro: selectedPro,
    selectedpro: selectedPro,
    proName: selectedPro,

    proPhone: globalProPhone,
    proContact: globalProPhone,

    price: finalPayPrice,
    finalPrice: finalPayPrice,
    paymentPrice: finalPayPrice,
    totalPrice: rawPrice,

    personCount: personCount + "인"
};

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(initialPayload)
                });
            } catch (err) {
                console.error("사전 장부 인입 에러 무시:", err);
            }

            const baseRedirect =
                window.location.origin +
                window.location.pathname +
                "?requestId=" + encodeURIComponent(requestId) +
                "&price=" + encodeURIComponent(finalPayPrice) +
                "&name=" + encodeURIComponent(nameInput) +
                "&personCount=" + encodeURIComponent(personCount + "인") +
                "&phone=" + encodeURIComponent(phoneInput) +
                "&proPhone=" + encodeURIComponent(globalProPhone) +
                "&type=" + encodeURIComponent(lessonType) +
                "&selectedPro=" + encodeURIComponent(selectedPro) +
                "&schedule=" + encodeURIComponent(schedule) +
                "&LOCATION=" + encodeURIComponent(locationText) +
                "&club=" + encodeURIComponent(club) +
                "&concern=" + encodeURIComponent(concern);

            Bootpay.requestPayment({
                application_id: "67ecd171d9af4e5c6d21736b",
                price: finalPayPrice,
                order_name: "스승님 골프 레슨비",
                order_id: requestId,
                pg: "nicepay",
                methods: ["card", "kakaopay"],
                user: {
                    username: nameInput,
                    phone: phoneInput
                },
                extra: {
                    open_type: "redirect",
                    display_success_result: true,
                    redirect_url: baseRedirect,
                    popup: false
                }
            });
        }

        function sharePaymentLink() {
            const currentUrl = window.location.href;

            if (navigator.share) {
                navigator.share({
                    title: "[스승님] 골프 레슨비 결제 요청",
                    text: "함께 레슨받을 지인분의 결제 페이지입니다. 확인 후 결제를 진행해 주세요!",
                    url: currentUrl
                }).catch(() => copyToClipboard(currentUrl));
            } else {
                copyToClipboard(currentUrl);
            }
        }

        function copyToClipboard(url) {
            navigator.clipboard.writeText(url).then(() => {
                alert("링크가 복사되었습니다. 카톡으로 지인에게 전달해 주세요!");
            }).catch(() => {
                alert("링크 복사에 실패했습니다. 주소창의 링크를 직접 복사해주세요.");
            });
        }

        function removeParam(queryString, paramsToRemove) {
            const urlParams = new URLSearchParams(queryString);

            paramsToRemove.forEach(param => {
                urlParams.delete(param);
            });

            return urlParams.toString();
        }
    </script>
</body>
</html>
